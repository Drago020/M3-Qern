<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AgentFlow AI</title>

<meta name="theme-color" content="#6B6B6B">
<link rel="manifest" href="manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">


<style>

:root{
--bg:#F5F5F5;
--card:#FFFFFF;
--text:#1C1C1C;
--border:#E0E0E0;
--accent:#6B6B6B;
}

body.dark{

--bg:#121212;
--card:#1E1E1E;
--text:#F1F1F1;
--border:#2A2A2A;
--accent:#8A8A8A;

}


*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}


body{

background:var(--bg);
color:var(--text);
height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;

}


header{

height:56px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 14px;
background:var(--card);
border-bottom:1px solid var(--border);

}



button{

padding:10px 12px;
border:none;
border-radius:12px;
background:var(--accent);
color:white;
cursor:pointer;

}



.app{

flex:1;
display:flex;
overflow:hidden;

}



.sidebar{

width:260px;
background:var(--card);
border-right:1px solid var(--border);
padding:10px;

}



.main{

flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:14px;

}



.chat{

width:100%;
max-width:900px;
height:100%;
background:var(--card);
border:1px solid var(--border);
border-radius:32px;
overflow:hidden;
display:flex;
flex-direction:column;

}



.messages{

flex:1;
overflow-y:auto;
padding:14px;
display:flex;
flex-direction:column;
gap:10px;

}



.msg{

max-width:75%;
padding:10px 12px;
border-radius:14px;
word-break:break-word;

}



.user{

background:#E6E6E6;
align-self:flex-end;

}



.ai{

background:#F3F3F3;
align-self:flex-start;

}



.inputBar{

display:flex;
gap:8px;
padding:12px;
border-top:1px solid var(--border);

}



input{

flex:1;
padding:12px;
border-radius:12px;
border:1px solid var(--border);
background:var(--card);
color:var(--text);

}



.settingsPanel{

position:fixed;
top:0;
right:-360px;
width:340px;
height:100vh;
background:var(--card);
border-left:1px solid var(--border);
padding:16px;
transition:.35s;
z-index:999;

}



.settingsPanel.open{

right:0;

}


</style>

</head>


<body>


<header>

<div>
AgentFlow AI
</div>


<div>

<button onclick="toggleDark()">🌙</button>

<button onclick="openSettings()">⚙️</button>

</div>


</header>


<div class="app">


<div class="sidebar">

<h3>Chats</h3>

</div>


<div class="main">


<div class="chat">


<div class="messages" id="messages"></div>



<div class="inputBar">

<input id="input" placeholder="Ask something...">

<button onclick="send()">Send</button>

</div>


</div>


</div>


</div>


<div id="settingsPanel" class="settingsPanel">


<h3>Settings</h3>


<br>


<label>
OpenRouter API Key
</label>


<input id="apiKey" placeholder="sk-...">



<br><br>


<label>
Model
</label>


<input id="model" placeholder="openai/gpt-4o-mini">



<br><br>


<button onclick="toggleDark()">
Toggle Dark
</button>


<br><br>


<button onclick="saveSettings()">
Save
</button>


<button onclick="closeSettings()">
Close
</button>


</div>


<script>


function scrollToBottom(){

let box=document.getElementById("messages");

box.scrollTop=box.scrollHeight;

}



function add(text,role){

let div=document.createElement("div");

div.className="msg "+role;

div.innerText=text;


document.getElementById("messages").appendChild(div);


scrollToBottom();

}




async function send(){


let input=document.getElementById("input");

let text=input.value.trim();



if(!text) return;



input.value="";



add(text,"user");



let key=localStorage.getItem("or_key");


let model=localStorage.getItem("model") || "openai/gpt-4o-mini";



if(!key){


add("Add API key in settings","ai");


return;


}




try{



let response = await fetch(
"https://openrouter.ai/api/v1/chat/completions",
{


method:"POST",


headers:{


"Authorization":"Bearer "+key,


"Content-Type":"application/json"


},



body:JSON.stringify({


model:model,


messages:[


{

role:"system",

content:"You are AgentFlow AI"

},


{

role:"user",

content:text

}


]


})


}

);




let data = await response.json();



console.log(data);




if(data.error){


add("API Error: "+data.error.message,"ai");


return;


}




add(

data.choices[0].message.content,

"ai"

);



}

catch(error){


add(

"Connection error: "+error.message,

"ai"

);


}



}





function openSettings(){



document.getElementById("settingsPanel")
.classList.add("open");



document.getElementById("apiKey").value =

localStorage.getItem("or_key") || "";




document.getElementById("model").value =

localStorage.getItem("model") || "openai/gpt-4o-mini";



}




function closeSettings(){



document.getElementById("settingsPanel")
.classList.remove("open");



}





function saveSettings(){



localStorage.setItem(

"or_key",

document.getElementById("apiKey").value

);



localStorage.setItem(

"model",

document.getElementById("model").value

);



closeSettings();



alert("Settings saved");



}





function toggleDark(){



document.body.classList.toggle("dark");



}





add(

"Agent ready.",

"ai"

);



</script>


</body>

</html>
