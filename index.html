<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentFlow AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#F5F5F5;
  --card:#FFFFFF;
  --text:#1C1C1C;
  --muted:#5F5F5F;
  --accent:#6B6B6B;
  --border:#E0E0E0;
}

body.dark{
  --bg:#121212;
  --card:#1E1E1E;
  --text:#F1F1F1;
  --muted:#A0A0A0;
  --accent:#8A8A8A;
  --border:#2A2A2A;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter;}

body{
  background:var(--bg);
  color:var(--text);
  height:100vh;
  display:flex;
  flex-direction:column;
}

header{
  padding:14px;
  display:flex;
  justify-content:space-between;
  background:var(--card);
  border-bottom:1px solid var(--border);
}

button{
  padding:10px 12px;
  border:none;
  border-radius:12px;
  background:var(--accent);
  color:white;
  cursor:pointer;
}

.container{
  display:grid;
  grid-template-columns:260px 1fr;
  height:100vh;
}

/* CHAT */
.chat{
  display:flex;
  flex-direction:column;
  height:100%;
}

/* 🔥 IMPORTANT FIX */
.messages{
  flex:1;
  padding:14px;
  overflow-y:auto;
  scroll-behavior:smooth; /* smooth scrolling */
  display:flex;
  flex-direction:column;
}

.msg{
  max-width:75%;
  padding:10px 12px;
  border-radius:12px;
  margin-bottom:10px;
  white-space:pre-wrap;
}

.user{
  background:#E6E6E6;
  margin-left:auto;
}

body.dark .user{background:#2C2C2C;}

.ai{
  background:#F3F3F3;
}

body.dark .ai{background:#262626;}

.input-area{
  display:flex;
  padding:12px;
  border-top:1px solid var(--border);
}

input{
  flex:1;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
}

.modal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.4);
}

.modal-content{
  background:var(--card);
  padding:18px;
  border-radius:16px;
  width:320px;
}
</style>
</head>

<body>

<header>
  <div>AgentFlow AI</div>
  <div>
    <button onclick="toggleDark()">🌙</button>
    <button onclick="openSettings()">⚙️</button>
  </div>
</header>

<div class="container">

<div class="chat">

<div class="messages" id="messages"></div>

<div class="input-area">
  <input id="input" placeholder="Ask something...">
  <button onclick="send()">Send</button>
</div>

</div>

</div>

<!-- SETTINGS -->
<div class="modal" id="modal">
<div class="modal-content">

<h3>Settings</h3>
<br>

<input id="apiKey" placeholder="OpenRouter API Key" style="width:100%;padding:10px;margin-bottom:10px;">
<input id="model" placeholder="model" style="width:100%;padding:10px;margin-bottom:10px;">

<button onclick="saveSettings()">Save</button>
<button onclick="closeSettings()" style="background:#777">Close</button>

</div>
</div>

<script>

let messages = [];

/* ================= SCROLL FIX ================= */
function scrollToBottom(){
  const box = document.getElementById("messages");
  box.scrollTop = box.scrollHeight;
}

/* ================= UI ================= */

function addMsg(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  document.getElementById("messages").appendChild(div);

  scrollToBottom(); // 🔥 ALWAYS KEEP BOTTOM
  return div;
}

/* ================= STREAMING ================= */

async function send(){

const input=document.getElementById("input");
const text=input.value.trim();
if(!text) return;

input.value="";

addMsg(text,"user");

const key=localStorage.getItem("or_key");
const model=localStorage.getItem("model") || "openai/gpt-4o-mini";

if(!key){
  addMsg("Add API key in settings","ai");
  return;
}

/* AI placeholder */
const aiDiv = addMsg("...", "ai");

try{

const res=await fetch("https://openrouter.ai/api/v1/chat/completions",{
method:"POST",
headers:{
"Authorization":"Bearer "+key,
"Content-Type":"application/json"
},
body:JSON.stringify({
model:model,
stream:true,
messages:[{role:"user",content:text}]
})
});

const reader=res.body.getReader();
const decoder=new TextDecoder();

let full="";

while(true){
  const {value,done}=await reader.read();
  if(done) break;

  const chunk=decoder.decode(value);
  const lines=chunk.split("\n");

  for(let line of lines){
    if(line.startsWith("data: ")){
      const data=line.replace("data: ","");

      if(data==="[DONE]") continue;

      try{
        const json=JSON.parse(data);
        const token=json.choices?.[0]?.delta?.content;

        if(token){
          full+=token;
          aiDiv.innerText=full;

          scrollToBottom(); // 🔥 STREAM SCROLL FIX
        }
      }catch(e){}
    }
  }
}

}catch(e){
aiDiv.innerText="Error";
}

}

/* ================= SETTINGS ================= */

function openSettings(){
  document.getElementById("modal").style.display="flex";
}

function closeSettings(){
  document.getElementById("modal").style.display="none";
}

function saveSettings(){
  localStorage.setItem("or_key",document.getElementById("apiKey").value);
  localStorage.setItem("model",document.getElementById("model").value);
  closeSettings();
}

/* ================= DARK ================= */

function toggleDark(){
  document.body.classList.toggle("dark");
}

</script>

</body>
</html>
