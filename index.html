<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentFlow AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#F5F5F5;
  --card:#FFFFFF;
  --text:#1C1C1C;
  --border:#E0E0E0;
  --accent:#6B6B6B;
}

body.dark{
  --bg:#121212;
  --card:#1E1E1E;
  --text:#F1F1F1;
  --border:#2A2A2A;
  --accent:#8A8A8A;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter,sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
  height:100vh;
  overflow:hidden;
  display:flex;
  flex-direction:column;

  /* 🌊 smooth global feel */
  transition:background 0.5s ease, color 0.5s ease;
}

/* HEADER */
header{
  padding:14px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:var(--card);
  border-bottom:1px solid var(--border);

  animation:slideDown 0.6s ease;
}

button{
  padding:10px 12px;
  border:none;
  border-radius:12px;
  background:var(--accent);
  color:white;
  cursor:pointer;

  transition:transform 0.15s ease, background 0.3s ease;
}

button:hover{
  transform:translateY(-1px);
  background:#555;
}

button:active{
  transform:scale(0.96);
}

/* LAYOUT */
.container{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:16px;
}

/* CHAT CARD */
.chat{
  width:100%;
  max-width:900px;
  height:100%;
  max-height:calc(100vh - 80px);

  display:flex;
  flex-direction:column;

  background:var(--card);
  border:1px solid var(--border);
  border-radius:32px;
  overflow:hidden;

  box-shadow:0 10px 30px rgba(0,0,0,0.08);

  animation:floatIn 0.7s cubic-bezier(.2,.8,.2,1);
}

/* MESSAGES */
.messages{
  flex:1;
  padding:14px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
  scroll-behavior:smooth;
}

/* ✨ MESSAGE ANIMATION */
.msg{
  max-width:75%;
  padding:10px 12px;
  border-radius:14px;
  white-space:pre-wrap;
  word-wrap:break-word;

  opacity:0;
  transform:translateY(10px) scale(0.98);
  animation:msgIn 0.35s ease forwards;
}

/* USER / AI */
.user{
  background:#E6E6E6;
  align-self:flex-end;
}

body.dark .user{background:#2C2C2C;}

.ai{
  background:#F3F3F3;
  align-self:flex-start;
}

body.dark .ai{background:#262626;}

/* INPUT */
.input-area{
  display:flex;
  padding:12px;
  border-top:1px solid var(--border);
  gap:8px;

  animation:slideUp 0.6s ease;
}

input{
  flex:1;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);

  transition:all 0.3s ease;
}

input:focus{
  outline:none;
  transform:scale(1.01);
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(8px);

  animation:fadeIn 0.3s ease;
}

.modal-content{
  background:var(--card);
  padding:18px;
  border-radius:18px;
  width:320px;

  animation:popIn 0.35s cubic-bezier(.2,.8,.2,1);
}

/* 🌊 ANIMATIONS */
@keyframes msgIn{
  to{
    opacity:1;
    transform:translateY(0) scale(1);
  }
}

@keyframes floatIn{
  from{
    opacity:0;
    transform:translateY(20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

@keyframes slideDown{
  from{transform:translateY(-20px);opacity:0;}
  to{transform:translateY(0);opacity:1;}
}

@keyframes slideUp{
  from{transform:translateY(20px);opacity:0;}
  to{transform:translateY(0);opacity:1;}
}

@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

@keyframes popIn{
  from{
    opacity:0;
    transform:scale(0.9);
  }
  to{
    opacity:1;
    transform:scale(1);
  }
}

/* MOBILE */
@media(max-width:900px){
  .chat{
    border-radius:0;
    max-height:100vh;
  }
}
</style>
</head>

<body>

<header>
  <div>AgentFlow AI</div>
  <div>
    <button onclick="toggleDark()">🌙</button>
    <button onclick="openSettings()">⚙️</button>
  </div>
</header>

<div class="container">

<div class="chat">

<div class="messages" id="messages"></div>

<div class="input-area">
  <input id="input" placeholder="Ask something...">
  <button onclick="send()">Send</button>
</div>

</div>

</div>

<!-- SETTINGS -->
<div class="modal" id="modal">
<div class="modal-content">

<h3>Settings</h3>
<br>

<input id="apiKey" placeholder="OpenRouter API Key" style="width:100%;padding:10px;margin-bottom:10px;">
<input id="model" placeholder="model" style="width:100%;padding:10px;margin-bottom:10px;">

<button onclick="saveSettings()">Save</button>
<button onclick="closeSettings()" style="background:#777">Close</button>

</div>
</div>

<script>

/* SCROLL */
function scrollToBottom(){
  const box=document.getElementById("messages");
  box.scrollTop=box.scrollHeight;
}

/* MESSAGE WITH ANIMATION DELAY */
function addMsg(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;

  document.getElementById("messages").appendChild(div);

  scrollToBottom();

  return div;
}

/* STREAMING */
async function send(){

const input=document.getElementById("input");
const text=input.value.trim();
if(!text) return;

input.value="";

addMsg(text,"user");

const key=localStorage.getItem("or_key");
const model=localStorage.getItem("model") || "openai/gpt-4o-mini";

if(!key){
  addMsg("Add API key in settings","ai");
  return;
}

const aiDiv=addMsg("...", "ai");

try{

const res=await fetch("https://openrouter.ai/api/v1/chat/completions",{
method:"POST",
headers:{
"Authorization":"Bearer "+key,
"Content-Type":"application/json"
},
body:JSON.stringify({
model:model,
stream:true,
messages:[{role:"user",content:text}]
})
});

const reader=res.body.getReader();
const decoder=new TextDecoder();

let full="";

while(true){
  const {value,done}=await reader.read();
  if(done) break;

  const chunk=decoder.decode(value);
  const lines=chunk.split("\n");

  for(let line of lines){
    if(line.startsWith("data: ")){
      const data=line.replace("data: ","");
      if(data==="[DONE]") continue;

      try{
        const json=JSON.parse(data);
        const token=json.choices?.[0]?.delta?.content;

        if(token){
          full+=token;
          aiDiv.innerText=full;
          scrollToBottom();
        }
      }catch(e){}
    }
  }
}

}catch(e){
aiDiv.innerText="Error";
}

/* micro animation refresh */
aiDiv.style.transform="scale(1.01)";
setTimeout(()=>aiDiv.style.transform="scale(1)",120);

}

/* SETTINGS */
function openSettings(){
  document.getElementById("modal").style.display="flex";
}

function closeSettings(){
  document.getElementById("modal").style.display="none";
}

function saveSettings(){
  localStorage.setItem("or_key",document.getElementById("apiKey").value);
  localStorage.setItem("model",document.getElementById("model").value);
  closeSettings();
}

/* DARK */
function toggleDark(){
  document.body.classList.toggle("dark");
}

</script>

</body>
</html>
