<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AgentFlow AI</title>

<meta name="theme-color" content="#6B6B6B">

<link rel="manifest" href="manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">


<style>

:root{
--bg:#F5F5F5;
--card:#FFFFFF;
--text:#1C1C1C;
--border:#E0E0E0;
--accent:#6B6B6B;
}


body.dark{

--bg:#121212;
--card:#1E1E1E;
--text:#F1F1F1;
--border:#2A2A2A;
--accent:#8A8A8A;

}



*{
box-sizing:border-box;
font-family:Inter,sans-serif;
}



body{

margin:0;
height:100vh;
display:flex;
flex-direction:column;
background:var(--bg);
color:var(--text);
overflow:hidden;

}



header{

height:56px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 14px;
background:var(--card);
border-bottom:1px solid var(--border);

}



button{

background:var(--accent);
color:white;
border:none;
padding:10px;
border-radius:12px;

}



.app{

flex:1;
display:flex;

}



.sidebar{

width:260px;
background:var(--card);
padding:10px;

}



.main{

flex:1;
padding:14px;

}



.chat{

height:100%;
background:var(--card);
border-radius:30px;
display:flex;
flex-direction:column;

}



.messages{

flex:1;
overflow:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;

}



.msg{

padding:10px;
border-radius:15px;
max-width:75%;

}



.user{

align-self:flex-end;
background:#ddd;

}



.ai{

align-self:flex-start;
background:#eee;

}



.inputBar{

display:flex;
gap:8px;
padding:12px;
border-top:1px solid var(--border);

}



input,textarea{

flex:1;
padding:10px;
border-radius:10px;
border:1px solid var(--border);

}



.settingsPanel{

position:fixed;
right:-360px;
top:0;
height:100vh;
width:340px;
background:var(--card);
padding:15px;
transition:.3s;

}



.settingsPanel.open{

right:0;

}


</style>

</head>


<body>


<header>

<div>
AgentFlow AI
</div>


<div>

<button onclick="toggleDark()">🌙</button>

<button onclick="openSettings()">⚙️</button>

</div>


</header>



<div class="app">


<div class="sidebar">

<h3>Chats</h3>

</div>


<div class="main">


<div class="chat">


<div id="messages" class="messages"></div>



<div class="inputBar">


<input id="input" placeholder="Ask something...">


<button onclick="startVoice()">🎤</button>


<input type="file" id="file" onchange="readFile()">



<button onclick="send()">
Send
</button>


</div>


</div>


</div>


</div>



<div id="settingsPanel" class="settingsPanel">


<h3>Settings</h3>


<br>


<label>API Key</label>

<input id="apiKey">



<br><br>


<label>Model</label>

<input id="model" value="openai/gpt-4o-mini">


<br><br>


<label>Personality</label>


<textarea id="personality"
placeholder="Example: be funny, act like a teacher..."></textarea>


<br><br>


<button onclick="toggleDark()">
Dark mode
</button>


<br><br>


<button onclick="saveSettings()">
Save
</button>


<button onclick="closeSettings()">
Close
</button>


  </div>

  <script>


let fileText = "";



function scrollToBottom(){

let box=document.getElementById("messages");

box.scrollTop=box.scrollHeight;

}




function add(text,role){


let div=document.createElement("div");


div.className="msg "+role;


div.innerText=text;


document.getElementById("messages")
.appendChild(div);


scrollToBottom();


}






async function send(){



let input=document.getElementById("input");


let text=input.value.trim();



if(!text)return;



input.value="";



add(text,"user");




let key=localStorage.getItem("or_key");


let model=localStorage.getItem("model") || "openai/gpt-4o-mini";


let personality=localStorage.getItem("personality") || "You are AgentFlow AI";




if(!key){

add("Add API key in settings","ai");

return;

}





let aiMessage=document.createElement("div");


aiMessage.className="msg ai";


document.getElementById("messages")
.appendChild(aiMessage);





try{


let response=await fetch(
"https://openrouter.ai/api/v1/chat/completions",
{


method:"POST",


headers:{


"Authorization":"Bearer "+key,

"Content-Type":"application/json"

},



body:JSON.stringify({


model:model,


stream:true,


messages:[


{

role:"system",

content:personality

},


{

role:"user",

content:text+"\n\n"+fileText

}


]


})


}

);




let reader=response.body.getReader();


let decoder=new TextDecoder();



while(true){


let {done,value}=await reader.read();


if(done)break;



let chunk=decoder.decode(value);



let lines=chunk.split("\n");



for(let line of lines){



if(line.startsWith("data:")){



let data=line.replace("data: ","");



if(data=="[DONE]")continue;



try{


let json=JSON.parse(data);


let token=json.choices[0].delta.content;


if(token){


aiMessage.innerText+=token;


scrollToBottom();


}



}catch(e){}



}



}


}



}catch(error){


aiMessage.innerText=
"Error: "+error.message;


}


}





function startVoice(){


let recognition =
new webkitSpeechRecognition();



recognition.lang="en-US";



recognition.onresult=function(event){


document.getElementById("input").value =

event.results[0][0].transcript;


};



recognition.start();



}





function readFile(){



let file=
document.getElementById("file")
.files[0];



if(!file)return;



let reader=new FileReader();



reader.onload=function(e){


fileText=e.target.result;


add("File loaded: "+file.name,"ai");


};



reader.readAsText(file);



}






function openSettings(){


document.getElementById("settingsPanel")
.classList.add("open");



document.getElementById("apiKey").value =
localStorage.getItem("or_key") || "";



document.getElementById("model").value =
localStorage.getItem("model") || "openai/gpt-4o-mini";



document.getElementById("personality").value =
localStorage.getItem("personality") || "";



}





function closeSettings(){


document.getElementById("settingsPanel")
.classList.remove("open");


}





function saveSettings(){



localStorage.setItem(

"or_key",

document.getElementById("apiKey").value

);



localStorage.setItem(

"model",

document.getElementById("model").value

);



localStorage.setItem(

"personality",

document.getElementById("personality").value

);



closeSettings();



alert("Saved");


}






function toggleDark(){


document.body.classList.toggle("dark");


}





add("Agent ready.","ai");



</script>


</body>

  </html>
