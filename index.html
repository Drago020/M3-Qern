<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AgentFlow AI</title>

<meta name="theme-color" content="#6B6B6B">
<link rel="manifest" href="manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#F5F5F5;
  --card:#FFFFFF;
  --text:#1C1C1C;
  --border:#E0E0E0;
  --accent:#6B6B6B;
}

body.dark{
  --bg:#121212;
  --card:#1E1E1E;
  --text:#F1F1F1;
  --border:#2A2A2A;
  --accent:#8A8A8A;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter, sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* HEADER */
header{
  height:56px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 14px;
  background:var(--card);
  border-bottom:1px solid var(--border);
}

/* APP */
.app{
  flex:1;
  display:flex;
  overflow:hidden;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:var(--card);
  border-right:1px solid var(--border);
  padding:10px;
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:14px;
}

/* CHAT */
.chat{
  width:100%;
  max-width:900px;
  height:100%;
  display:flex;
  flex-direction:column;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:32px;
  overflow:hidden;
}

/* MESSAGES */
.messages{
  flex:1;
  overflow-y:auto;
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:75%;
  padding:10px 12px;
  border-radius:14px;
  word-break:break-word;
}

.user{background:#E6E6E6;align-self:flex-end;}
.ai{background:#F3F3F3;align-self:flex-start;}

/* INPUT */
.inputBar{
  display:flex;
  gap:8px;
  padding:12px;
  border-top:1px solid var(--border);
}

input{
  flex:1;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
}

button{
  padding:10px 12px;
  border:none;
  border-radius:12px;
  background:var(--accent);
  color:white;
  cursor:pointer;
}

/* SETTINGS PANEL */
.settingsPanel{
  position:fixed;
  top:0;
  right:-360px;
  width:340px;
  height:100vh;
  background:var(--card);
  border-left:1px solid var(--border);
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:10px;
  transition:0.35s ease;
  z-index:999;
}

.settingsPanel.open{
  right:0;
}

.settingsHeader{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.settingsPanel input{
  padding:10px;
  border-radius:10px;
  border:1px solid var(--border);
}

.saveBtn{
  margin-top:auto;
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <div>AgentFlow AI</div>
  <div>
    <button onclick="toggleDark()">🌙</button>
    <button onclick="openSettings()">⚙️</button>
  </div>
</header>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>Chats</h3>
</div>

<!-- MAIN -->
<div class="main">

<div class="chat">

<div class="messages" id="messages"></div>

<div class="inputBar">
  <input id="input" placeholder="Ask something...">
  <button onclick="send()">Send</button>
</div>

</div>

</div>

</div>

<!-- SETTINGS PANEL -->
<div id="settingsPanel" class="settingsPanel">

<div class="settingsHeader">
  <h3>Settings</h3>
  <button onclick="closeSettings()">✖</button>
</div>

<label>OpenRouter API Key</label>
<input id="apiKey" placeholder="sk-..." />

<label>Model</label>
<input id="model" placeholder="openai/gpt-4o-mini" />

<button onclick="toggleDark()">Toggle Dark Mode</button>

<button class="saveBtn" onclick="saveSettings()">Save</button>

</div>

<script>

function scrollToBottom(){
  const box=document.getElementById("messages");
  box.scrollTop=box.scrollHeight;
}

function add(text,role){
  const div=document.createElement("div");
  div.className="msg "+role;
  div.innerText=text;
  document.getElementById("messages").appendChild(div);
  scrollToBottom();
}

async function send(){

const input=document.getElementById("input");
const text=input.value.trim();
if(!text) return;

input.value="";

add(text,"user");

const key=localStorage.getItem("or_key");
const model=localStorage.getItem("model") || "openai/gpt-4o-mini";

if(!key){
  add("Add API key in settings","ai");
  return;
}

const res=await fetch("https://openrouter.ai/api/v1/chat/completions",{
method:"POST",
headers:{
"Authorization":"Bearer "+key,
"Content-Type":"application/json"
},
body:JSON.stringify({
model:model,
messages:[{role:"user",content:text}]
})
});

const data=await res.json();
add(data.choices?.[0]?.message?.content || "Error","ai");

}

/* SETTINGS */
function openSettings(){
  document.getElementById("settingsPanel").classList.add("open");

  document.getElementById("apiKey").value =
    localStorage.getItem("or_key") || "";

  document.getElementById("model").value =
    localStorage.getItem("model") || "openai/gpt-4o-mini";
}

function closeSettings(){
  document.getElementById("settingsPanel").classList.remove("open");
}

function saveSettings(){
  localStorage.setItem("or_key",document.getElementById("apiKey").value);
  localStorage.setItem("model",document.getElementById("model").value);
  closeSettings();
}

/* DARK */
function toggleDark(){
  document.body.classList.toggle("dark");
}

/* INIT */
add("Agent ready.","ai");

</script>

</body>
</html>
