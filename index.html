<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentFlow AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#F5F5F5;
  --card:#FFFFFF;
  --text:#1C1C1C;
  --border:#E0E0E0;
  --accent:#6B6B6B;
}

body.dark{
  --bg:#121212;
  --card:#1E1E1E;
  --text:#F1F1F1;
  --border:#2A2A2A;
  --accent:#8A8A8A;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter, sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* HEADER */
header{
  padding:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:var(--card);
  border-bottom:1px solid var(--border);
}

/* BUTTON */
button{
  padding:10px 12px;
  border:none;
  border-radius:12px;
  background:var(--accent);
  color:white;
  cursor:pointer;
}

/* MAIN LAYOUT */
.container{
  flex:1;
  display:flex;
  justify-content:center;   /* 🔥 centers chat */
  align-items:stretch;
  padding:14px;
}

/* CHAT WRAPPER */
.chat{
  width:100%;
  max-width:900px;          /* 🔥 prevents weird shrinking */
  display:flex;
  flex-direction:column;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  overflow:hidden;
}

/* MESSAGES */
.messages{
  flex:1;
  padding:14px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;                /* better spacing */
  scroll-behavior:smooth;
}

/* MESSAGE BUBBLES */
.msg{
  padding:10px 12px;
  border-radius:12px;
  max-width:75%;
  white-space:pre-wrap;
  word-wrap:break-word;
}

/* USER RIGHT SIDE */
.user{
  background:#E6E6E6;
  align-self:flex-end;     /* 🔥 FIX alignment */
}

body.dark .user{
  background:#2C2C2C;
}

/* AI LEFT SIDE */
.ai{
  background:#F3F3F3;
  align-self:flex-start;   /* 🔥 FIX alignment */
}

body.dark .ai{
  background:#262626;
}

/* INPUT */
.input-area{
  display:flex;
  padding:12px;
  border-top:1px solid var(--border);
  gap:8px;
}

input{
  flex:1;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.4);
}

.modal-content{
  background:var(--card);
  padding:18px;
  border-radius:16px;
  width:320px;
}

/* MOBILE */
@media(max-width:900px){
  .chat{
    max-width:100%;
    border-radius:0;
  }
}
</style>
</head>

<body>

<header>
  <div>AgentFlow AI</div>
  <div>
    <button onclick="toggleDark()">🌙</button>
    <button onclick="openSettings()">⚙️</button>
  </div>
</header>

<div class="container">

<div class="chat">

<div class="messages" id="messages"></div>

<div class="input-area">
  <input id="input" placeholder="Ask something...">
  <button onclick="send()">Send</button>
</div>

</div>

</div>

<!-- SETTINGS -->
<div class="modal" id="modal">
<div class="modal-content">

<h3>Settings</h3>
<br>

<input id="apiKey" placeholder="OpenRouter API Key" style="width:100%;padding:10px;margin-bottom:10px;">
<input id="model" placeholder="model" style="width:100%;padding:10px;margin-bottom:10px;">

<button onclick="saveSettings()">Save</button>
<button onclick="closeSettings()" style="background:#777">Close</button>

</div>
</div>

<script>

function scrollToBottom(){
  const box=document.getElementById("messages");
  box.scrollTop=box.scrollHeight;
}

function addMsg(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  document.getElementById("messages").appendChild(div);
  scrollToBottom();
  return div;
}

/* STREAMING */
async function send(){

const input=document.getElementById("input");
const text=input.value.trim();
if(!text) return;

input.value="";

addMsg(text,"user");

const key=localStorage.getItem("or_key");
const model=localStorage.getItem("model") || "openai/gpt-4o-mini";

if(!key){
  addMsg("Add API key in settings","ai");
  return;
}

const aiDiv=addMsg("...", "ai");

try{

const res=await fetch("https://openrouter.ai/api/v1/chat/completions",{
method:"POST",
headers:{
"Authorization":"Bearer "+key,
"Content-Type":"application/json"
},
body:JSON.stringify({
model:model,
stream:true,
messages:[{role:"user",content:text}]
})
});

const reader=res.body.getReader();
const decoder=new TextDecoder();

let full="";

while(true){
  const {value,done}=await reader.read();
  if(done) break;

  const chunk=decoder.decode(value);
  const lines=chunk.split("\n");

  for(let line of lines){
    if(line.startsWith("data: ")){
      const data=line.replace("data: ","");
      if(data==="[DONE]") continue;

      try{
        const json=JSON.parse(data);
        const token=json.choices?.[0]?.delta?.content;

        if(token){
          full+=token;
          aiDiv.innerText=full;
          scrollToBottom();
        }
      }catch(e){}
    }
  }
}

}catch(e){
aiDiv.innerText="Error";
}

}

/* SETTINGS */
function openSettings(){
  document.getElementById("modal").style.display="flex";
}

function closeSettings(){
  document.getElementById("modal").style.display="none";
}

function saveSettings(){
  localStorage.setItem("or_key",document.getElementById("apiKey").value);
  localStorage.setItem("model",document.getElementById("model").value);
  closeSettings();
}

/* DARK MODE */
function toggleDark(){
  document.body.classList.toggle("dark");
}

</script>

</body>
</html>
