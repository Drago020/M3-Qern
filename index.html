<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentFlow AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#F5F5F5;
  --card:#FFFFFF;
  --text:#1C1C1C;
  --border:#E0E0E0;
  --accent:#6B6B6B;
}

body.dark{
  --bg:#121212;
  --card:#1E1E1E;
  --text:#F1F1F1;
  --border:#2A2A2A;
  --accent:#8A8A8A;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter, sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* HEADER (FIXED + ALWAYS VISIBLE) */
header{
  height:56px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 14px;
  background:var(--card);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  z-index:10;
}

/* LAYOUT */
.app{
  flex:1;
  display:flex;
  overflow:hidden;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:var(--card);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
}

.chatList{
  flex:1;
  overflow:auto;
  padding:10px;
}

.chatItem{
  padding:10px;
  border-radius:10px;
  margin-bottom:6px;
  background:#f3f3f3;
  cursor:pointer;
}

.chatItem.active{
  background:#e6e6e6;
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:14px;
  overflow:hidden;
}

/* CHAT CARD */
.chat{
  width:100%;
  max-width:900px;
  height:100%;
  display:flex;
  flex-direction:column;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:32px;
  overflow:hidden;
}

/* MESSAGES (ONLY SCROLL AREA) */
.messages{
  flex:1;
  overflow-y:auto;
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:75%;
  padding:10px 12px;
  border-radius:14px;
  white-space:pre-wrap;
  word-break:break-word;
}

.user{
  background:#E6E6E6;
  align-self:flex-end;
}

.ai{
  background:#F3F3F3;
  align-self:flex-start;
}

/* INPUT (ALWAYS FIXED INSIDE CHAT) */
.inputBar{
  display:flex;
  gap:8px;
  padding:12px;
  border-top:1px solid var(--border);
  flex-shrink:0;
  background:var(--card);
}

input{
  flex:1;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
}

button{
  padding:10px 12px;
  border:none;
  border-radius:12px;
  background:var(--accent);
  color:white;
  cursor:pointer;
}

/* MOBILE */
@media(max-width:900px){
  .sidebar{display:none;}
  .chat{border-radius:0;}
}
</style>
</head>

<body>

<!-- HEADER (RESTORED SETTINGS BUTTON) -->
<header>
  <div>AgentFlow AI</div>
  <div>
    <button onclick="toggleDark()">🌙</button>
    <button onclick="alert('Settings coming soon upgrade')">⚙️</button>
  </div>
</header>

<!-- APP -->
<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
  <h3 style="padding:12px;">Chats</h3>
  <div class="chatList" id="chatList"></div>
</div>

<!-- MAIN CHAT -->
<div class="main">

<div class="chat">

<div class="messages" id="messages"></div>

<div class="inputBar">
  <input id="input" placeholder="Ask something...">
  <button onclick="send()">Send</button>
</div>

</div>

</div>

</div>

<script>

let chats = JSON.parse(localStorage.getItem("chats")||"{}");
let current = "default";

if(!chats[current]){
  chats[current]={messages:[]};
}

function save(){
  localStorage.setItem("chats",JSON.stringify(chats));
}

function render(){
  const box=document.getElementById("messages");
  box.innerHTML="";

  chats[current].messages.forEach(m=>{
    const div=document.createElement("div");
    div.className="msg "+m.role;
    div.innerText=m.text;
    box.appendChild(div);
  });

  box.scrollTop=box.scrollHeight;
}

function add(text,role){
  chats[current].messages.push({text,role});
  save();
  render();
}

/* SEND */
async function send(){

const input=document.getElementById("input");
const text=input.value.trim();
if(!text) return;

input.value="";

add(text,"user");

const key=localStorage.getItem("or_key");

if(!key){
  add("Add API key in settings","ai");
  return;
}

const res=await fetch("https://openrouter.ai/api/v1/chat/completions",{
method:"POST",
headers:{
"Authorization":"Bearer "+key,
"Content-Type":"application/json"
},
body:JSON.stringify({
model:"openai/gpt-4o-mini",
messages:chats[current].messages.map(m=>({
role:m.role,
content:m.text
}))
})
});

const data=await res.json();
const reply=data.choices?.[0]?.message?.content || "Error";

add(reply,"ai");

}

function toggleDark(){
  document.body.classList.toggle("dark");
}

render();

</script>

</body>
</html>
