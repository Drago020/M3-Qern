<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentFlow AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  /* 🪨 TRUE NEUTRAL MATERIAL YOU */
  --bg:#F5F5F5;
  --card:#FFFFFF;
  --text:#1C1C1C;
  --muted:#5F5F5F;
  --accent:#6B6B6B;
  --border:#E0E0E0;
  --radius:18px;
  --shadow:0 8px 24px rgba(0,0,0,0.06);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter, sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* HEADER */
header{
  background:var(--card);
  padding:14px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid var(--border);
}

.logo{
  font-weight:600;
}

button{
  background:var(--accent);
  color:white;
  border:none;
  padding:10px 14px;
  border-radius:12px;
  cursor:pointer;
}

button:hover{
  background:#555;
}

/* LAYOUT */
.container{
  display:grid;
  grid-template-columns:260px 1fr;
  gap:14px;
  padding:14px;
  flex:1;
}

/* SIDEBAR */
.sidebar{
  background:var(--card);
  border-radius:var(--radius);
  padding:12px;
  box-shadow:var(--shadow);
}

.agent{
  padding:10px;
  margin-bottom:8px;
  border-radius:12px;
  background:#F0F0F0;
  cursor:pointer;
}

.agent.active{
  background:#E6E6E6;
  border:1px solid var(--border);
}

/* CHAT */
.chat{
  background:var(--card);
  border-radius:var(--radius);
  display:flex;
  flex-direction:column;
  box-shadow:var(--shadow);
  overflow:hidden;
  height:calc(100vh - 120px);
}

.messages{
  flex:1;
  padding:14px;
  overflow-y:auto;
}

.msg{
  max-width:75%;
  padding:10px 12px;
  border-radius:12px;
  margin-bottom:10px;
}

.user{
  background:#E6E6E6;
  margin-left:auto;
}

.ai{
  background:#F3F3F3;
}

/* INPUT */
.input-area{
  display:flex;
  padding:12px;
  border-top:1px solid var(--border);
  gap:8px;
}

input{
  flex:1;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--border);
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:var(--card);
  padding:18px;
  border-radius:16px;
  width:300px;
  box-shadow:var(--shadow);
}

/* MOBILE */
@media(max-width:900px){
  .container{
    grid-template-columns:1fr;
  }

  .chat{
    height:calc(100vh - 160px);
  }
}
</style>
</head>

<body>

<header>
  <div class="logo">AgentFlow AI</div>
  <button onclick="openSettings()">⚙️ Settings</button>
</header>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="agent active">GPT (OpenRouter)</div>
  <div class="agent">Claude</div>
  <div class="agent">Gemini</div>
  <div class="agent">DeepSeek</div>
</div>

<!-- CHAT -->
<div class="chat">
  <div class="messages" id="messages">
    <div class="msg ai">👋 Add your OpenRouter API key in settings to start.</div>
  </div>

  <div class="input-area">
    <input id="input" placeholder="Ask something...">
    <button onclick="send()">Send</button>
  </div>
</div>

</div>

<!-- SETTINGS MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Settings</h3>
    <br>

    <label>OpenRouter API Key</label>
    <input id="apiKey" placeholder="sk-or-..." style="width:100%;margin-top:8px;padding:10px;border-radius:10px;border:1px solid var(--border);">

    <br><br>

    <button onclick="saveKey()">Save</button>
    <button onclick="closeSettings()" style="background:#999">Close</button>
  </div>
</div>

<script>

function openSettings(){
  document.getElementById("modal").style.display="flex";
}

function closeSettings(){
  document.getElementById("modal").style.display="none";
}

function saveKey(){
  const key=document.getElementById("apiKey").value;
  localStorage.setItem("openrouter_key",key);
  alert("Saved!");
  closeSettings();
}

function addMsg(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  document.getElementById("messages").appendChild(div);
}

async function send(){

const input=document.getElementById("input");
const text=input.value.trim();
if(!text) return;

addMsg(text,"user");
input.value="";

const key=localStorage.getItem("openrouter_key");

if(!key){
  addMsg("Please add API key in settings","ai");
  return;
}

try{

const res=await fetch("https://openrouter.ai/api/v1/chat/completions",{
method:"POST",
headers:{
"Authorization":"Bearer "+key,
"Content-Type":"application/json"
},
body:JSON.stringify({
model:"openai/gpt-4o-mini",
messages:[{role:"user",content:text}]
})
});

const data=await res.json();

addMsg(
data.choices?.[0]?.message?.content || "No response",
"ai"
);

}catch(e){
addMsg("Request failed","ai");
}

}

</script>

</body>
    </html>
